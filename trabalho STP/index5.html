<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Defender: Refinado</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010108; font-family: 'Segoe UI', sans-serif; color: #fff; }
       canvas { 
    display: block; 
    cursor: none; /* Isso faz o mouse desaparecer completamente sobre o jogo */
}
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stat { font-size: 11px; color: #00f2ff; letter-spacing: 1px; }
        .val { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0,242,255,0.5); }
        #ammo-val { color: #ff3333; }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: rgba(10,10,20,0.95); padding: 40px; border: 2px solid #00f2ff; border-radius: 15px; }
        button { background: #00f2ff; border: none; padding: 12px 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat">PONTUAÇÃO</div><div id="score" class="val">0</div>
        <div class="stat">MUNIÇÃO</div><div id="ammo-val" class="val">50</div>
        <div class="stat">ESTÁGIO</div><div id="stage" class="val">1</div>
    </div>

    <div id="game-over">
        <h1 style="color: #00f2ff;">FIM DA TRANSMISSÃO</h1>
        <p>Pontos acumulados: <span id="final-score">0</span></p>
        <button onclick="location.reload()">REINICIAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>// --- COPIE E SUBSTITUA APENAS O CONTEÚDO DA TAG <SCRIPT> ---

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let ammo = 50;
let level = 1;
let gameActive = true;
let frames = 0;
const keys = { w: false, a: false, s: false, d: false };

// --- CLASSE DO BOSS ---
class Boss {
    constructor() {
        this.x = canvas.width / 2;
        this.y = -100;
        this.targetY = 100;
        this.hp = 100;
        this.maxHp = 100;
        this.speed = 3;
        this.direction = 1;
        this.active = false;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        // Corpo do Boss
        ctx.fillStyle = "#ff0055";
        ctx.beginPath();
        ctx.moveTo(-60, 0);
        ctx.lineTo(60, 0);
        ctx.lineTo(40, 40);
        ctx.lineTo(-40, 40);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 4;
        ctx.stroke();
        // Barra de Vida do Boss
        ctx.fillStyle = "#333";
        ctx.fillRect(-50, -20, 100, 10);
        ctx.fillStyle = "#ff0055";
        ctx.fillRect(-50, -20, (this.hp / this.maxHp) * 100, 10);
        ctx.restore();
    }
    update() {
        if (this.y < this.targetY) this.y += 2;
        else {
            this.x += this.speed * this.direction;
            if (this.x > canvas.width - 100 || this.x < 100) this.direction *= -1;
        }
    }
}

class Player {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height - 100;
        this.radius = 15;
        this.speed = 8;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.beginPath();
        ctx.fillStyle = "#ffaa00";
        ctx.arc(0, 15, Math.random() * 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, -22);
        ctx.lineTo(-18, 12);
        ctx.lineTo(18, 12);
        ctx.closePath();
        ctx.fillStyle = "#00f2ff";
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
    }
    update() {
        if (keys.w && this.y > 30) this.y -= this.speed;
        if (keys.s && this.y < canvas.height - 30) this.y += this.speed;
        if (keys.a && this.x > 30) this.x -= this.speed;
        if (keys.d && this.x < canvas.width - 30) this.x += this.speed;
    }
}

class Bullet {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speed = 12;
        this.active = true;
    }
    draw() {
        ctx.fillStyle = "#fff700";
        ctx.shadowBlur = 8;
        ctx.shadowColor = "#fff700";
        ctx.fillRect(this.x - 2, this.y, 4, 12);
        ctx.shadowBlur = 0;
    }
    update() { this.y -= this.speed; }
}

class Meteor {
    constructor() {
        this.radius = Math.random() * 45 + 20;
        this.x = Math.random() * (canvas.width - 60) + 30;
        this.y = -80;
        this.hp = Math.ceil(this.radius / 12);
        this.speed = Math.random() * 1.5 + 1.5 + (level * 0.4);
        this.active = true;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#222";
        ctx.strokeStyle = this.hp <= 1 ? "#ff3333" : "#666";
        ctx.lineWidth = 3;
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.fillText(this.hp, this.x - 5, this.y + 5);
    }
    update() { this.y += this.speed; }
}

class AmmoDrop {
    constructor() {
        this.size = 18;
        this.x = Math.random() * (canvas.width - 40) + 20;
        this.y = -50;
        this.speed = 2.5;
    }
    draw() {
        ctx.fillStyle = "#ff0000";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff0000";
        ctx.fillRect(this.x - 9, this.y - 9, 18, 18);
        ctx.strokeStyle = "#fff";
        ctx.strokeRect(this.x - 9, this.y - 9, 18, 18);
        ctx.shadowBlur = 0;
    }
    update() { this.y += this.speed; }
}

const player = new Player();
const boss = new Boss();
let bullets = [];
let meteors = [];
let drops = [];

window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

window.addEventListener('mousedown', (e) => {
    if (gameActive && ammo > 0 && e.button === 0) {
        bullets.push(new Bullet(player.x, player.y - 20));
        ammo--;
        document.getElementById('ammo-val').innerText = ammo;
    }
});

function animate() {
    if (!gameActive) return;

    ctx.fillStyle = 'rgba(1, 1, 8, 0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    player.update();
    player.draw();

    // LÓGICA DO BOSS
    if (level >= 5) {
        boss.active = true;
        boss.update();
        boss.draw();

        // Colisão Bala vs Boss
        bullets.forEach(b => {
            if (b.x > boss.x - 60 && b.x < boss.x + 60 && b.y > boss.y && b.y < boss.y + 40 && b.active) {
                boss.hp -= 1;
                b.active = false;
                if (boss.hp <= 0) {
                    gameActive = false;
                    alert("BOSS DERROTADO! VOCÊ SALVOU O ESPAÇO!");
                    location.reload();
                }
            }
        });
    }

    // Spawn de Meteoros (Para apenas se o boss estiver ativo)
    if (!boss.active && frames % Math.max(15, 60 - (level * 5)) === 0) {
        meteors.push(new Meteor());
    }

    if (frames % 350 === 0) {
        drops.push(new AmmoDrop());
    }

    drops.forEach((d, di) => {
        d.update(); d.draw();
        if (Math.hypot(player.x - d.x, player.y - d.y) < player.radius + 15) {
            ammo += 20;
            document.getElementById('ammo-val').innerText = ammo;
            drops.splice(di, 1);
        }
        if (d.y > canvas.height) drops.splice(di, 1);
    });

    bullets.forEach((b, bi) => {
        b.update(); b.draw();
        if (b.y < -20) b.active = false;
    });
    bullets = bullets.filter(b => b.active);

    meteors.forEach((m, mi) => {
        m.update(); m.draw();
        const distPlayer = Math.hypot(player.x - m.x, player.y - m.y);
        if (distPlayer < m.radius + 10) {
            gameActive = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        bullets.forEach((b) => {
            const distBullet = Math.hypot(b.x - m.x, b.y - m.y);
            if (distBullet < m.radius + 5 && b.active) {
                m.hp -= 1;
                b.active = false;
                if (m.hp <= 0) {
                    m.active = false;
                    score += Math.floor(m.radius);
                    document.getElementById('score').innerText = score;
                    level = Math.floor(score / 1000) + 1;
                    document.getElementById('stage').innerText = level;
                }
            }
        });
        if (m.y > canvas.height + 100) m.active = false;
    });
    meteors = meteors.filter(m => m.active);

    frames++;
    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
    </script>
</body>
</html>
